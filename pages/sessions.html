<div id="page-sessions" class="page active">
  <div class="page-inner">
    <div class="page-hero sessions-hero">
      <div class="sessions-hero-badge">📚 CURRICULUM</div>
      <h1>All Sessions</h1>
      <p>Explore slides, videos, resources, and take quizzes for every grade!</p>
    </div>
    
    <!-- FILTER BAR -->
    <div class="sessions-filter-bar" id="sessionsFilterBar">
      <div class="sessions-search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="sessionSearchInput" class="sessions-search" placeholder="Search sessions…" oninput="filterSessions()" />
      </div>
      
      <div class="sessions-filter-pills" id="gradeFilterPills">
        <button class="filter-pill active" data-grade="all" onclick="setSessionGrade('all', this)">All Grades</button>
        <button class="filter-pill" data-grade="grade-1" onclick="setSessionGrade('grade-1', this)">Grade 1</button>
        <button class="filter-pill" data-grade="grade-2" onclick="setSessionGrade('grade-2', this)">Grade 2</button>
        <button class="filter-pill" data-grade="grade-3" onclick="setSessionGrade('grade-3', this)">Grade 3</button>
        <button class="filter-pill" data-grade="grade-4" onclick="setSessionGrade('grade-4', this)">Grade 4</button>
        <button class="filter-pill" data-grade="grade-5" onclick="setSessionGrade('grade-5', this)">Grade 5</button>
        <button class="filter-pill" data-grade="grade-6" onclick="setSessionGrade('grade-6', this)">Grade 6</button>
        <button class="filter-pill" data-grade="grade-7" onclick="setSessionGrade('grade-7', this)">Grade 7</button>
        <button class="filter-pill" data-grade="grade-8" onclick="setSessionGrade('grade-8', this)">Grade 8</button>
        <button class="filter-pill" data-grade="grade-9" onclick="setSessionGrade('grade-9', this)">Grade 9</button>
      </div>
      
      <div class="sessions-status-pills" id="phaseFilterPills">
        <!-- Dynamically populated by JS -->
      </div>
    </div>
    
    <div class="sessions-count" id="sessionsCount"></div>
    
    <div class="sessions-list-grid" id="sessionsListGrid"></div>
  </div>
</div>
