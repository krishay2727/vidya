<div id="page-whiteboard" class="page active">
  <div class="wb-page-inner">
    <div class="wb-page-hero">
      <div>
        <h1>✏️ Circuit Whiteboard</h1>
        <p>Design your circuits here. Drag wires and place components like Tinkercad!</p>
      </div>
      
      <!-- New Tinkercad-like Toolbar -->
      <div class="wb-toolbar">
          <div class="wb-toolbar-row">
              <span class="wb-toolbar-title" style="color: var(--cyan);">COMPONENTS:</span>
              <button class="btn-sm" onclick="wbSetMode('component', 'battery')" style="background: #222; color: white; border: 1px solid #444;">🔋 Battery</button>
              <button class="btn-sm" onclick="wbSetMode('component', 'led')" style="background: #FF4757; color: white;">💡 LED</button>
              <button class="btn-sm" onclick="wbSetMode('component', 'resistor')" style="background: #e8c396; color: black;">〰️ Resistor</button>
              <button class="btn-sm" onclick="wbSetMode('component', 'motor')" style="background: #ccc; color: black;">⚙️ Motor</button>
          </div>
          <div class="wb-toolbar-row" style="margin-top: 10px;">
              <span class="wb-toolbar-title" style="color: var(--orange);">WIRES:</span>
              <button class="btn-sm" onclick="wbSetMode('wire', '#FF4757')" style="background: transparent; color: #FF4757; border: 1px solid #FF4757;">+ Red Wire</button>
              <button class="btn-sm" onclick="wbSetMode('wire', '#888888')" style="background: transparent; color: #aaa; border: 1px solid #888;">- Black Wire</button>
              <button class="btn-sm" onclick="wbSetMode('wire', '#00FF88')" style="background: transparent; color: #00FF88; border: 1px solid #00FF88;">⚡ Signal Green</button>
              
              <div class="wb-toolbar-divider"></div>
              
              <span class="wb-toolbar-title" style="color: var(--text-muted); width: auto; margin-right: 8px;">TOOLS:</span>
              <button class="btn-sm" onclick="wbSetMode('move', null)" style="background: #007BFF; color: white; border: 1px solid #0056b3;">🖱️ Pointer</button>
              <button class="btn-sm" onclick="wbSetMode('pen', '#F0F2FF')" style="background: #333; color: white;">✏️ White Pen</button>
              <button class="btn-sm" onclick="wbSetMode('erase', null)" style="background: #131629; color: white; border: 1px solid white;">🧹 Eraser</button>
              <button class="btn-sm" onclick="wbClear()" style="background: transparent; border: 1px solid var(--red); color: var(--red);">🗑️ Clear</button>
              
              <div class="wb-toolbar-divider"></div>
              
              <button class="btn-sm" id="wbRunBtn" onclick="wbToggleRun()">▶️ Run Circuit</button>
          </div>
      </div>

    </div>
    
    <!-- Dotted background grid container -->
    <div id="wbCanvasContainer" class="wb-canvas-container">
      <canvas id="whiteboardCanvas" class="wb-canvas"></canvas>
      
      <!-- Glassmorphic Properties Panel -->
      <div id="wbPropertiesPanel" class="wb-properties-panel">
          <h3 id="wbPropTitle">Properties</h3>
          <div id="wbPropResistor" class="wb-prop-group">
              <label class="wb-prop-label">Resistance (Ohms):</label>
              <input type="number" id="wbResistorValue" value="220" onchange="wbUpdateComponent()" onkeyup="wbUpdateComponent()" class="wb-prop-input">
          </div>
          <div id="wbPropBattery" class="wb-prop-group">
              <label class="wb-prop-label">Voltage:</label>
              <input type="text" value="9V" disabled class="wb-prop-input">
          </div>
      </div>
    </div>
  </div>
</div>
