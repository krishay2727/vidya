<div id="page-projects" class="page active">
  <div class="page-inner">
    <div class="page-hero projects-hero">
      <div class="projects-hero-badge">🚀 MAKER LAB</div>
      <h1>Projects Gallery</h1>
      <p>These are YOUR projects. Design, build, present — and download the files to make your own.</p>
    </div>

    <!-- FILTER BAR -->
    <div class="projects-filter-bar" id="projectsFilterBar" style="flex-wrap: wrap;">
      <div class="projects-search-wrap" style="flex: 1; min-width: 250px;">
        <span class="search-icon">🔍</span>
        <input type="text" id="projectSearchInput" class="projects-search" placeholder="Search by title, description, keywords..." oninput="filterProjects()" />
      </div>
      
      <div class="projects-dropdowns" style="display: flex; gap: 12px; flex-wrap: wrap;">
        <select id="filterDifficulty" class="projects-select" onchange="filterProjects()" style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit;">
          <option value="all">All Difficulties</option>
          <option value="1">⭐ 1 Star</option>
          <option value="2">⭐⭐ 2 Stars</option>
          <option value="3">⭐⭐⭐ 3 Stars</option>
          <option value="4">⭐⭐⭐⭐ 4 Stars</option>
          <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
        </select>

        <select id="filterMicrocontroller" class="projects-select" onchange="filterProjects()" style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit;">
          <option value="all">All Microcontrollers</option>
        </select>

        <select id="filterComponent" class="projects-select" onchange="filterProjects()" style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit;">
          <option value="all">All Components</option>
        </select>
      </div>
    </div>

    <div class="projects-count" id="projectsCount"></div>
    <div class="projects-grid" id="projectsGrid"></div>
  </div>
</div>
