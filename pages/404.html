<!DOCTYPE html>

</html>

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    var path = globalThis.location.pathname;
    var parts = path.split('/').filter(Boolean);
    var repo = "vidya";

    var page = "";
    if (parts[0] === repo) {
      page = parts.slice(1).join('/');
    } else {
      page = parts.join('/');
    }

    var search = globalThis.location.search || "";
    var hash = globalThis.location.hash || "";

    // Construct redirect target URL back to index.html with ?p=page
    var target = globalThis.location.protocol + "//" + globalThis.location.host + "/" + repo + "/?p=" + encodeURIComponent(page);
    if (search) {
      target += "&s=" + encodeURIComponent(search);
    }
    if (hash) {
      target += hash;
    }

    globalThis.location.replace(target);
  </script>
</head>

<body>
</body>

</html>
