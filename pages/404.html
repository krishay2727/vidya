<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    var path = window.location.pathname;
    var parts = path.split('/').filter(Boolean);
    var repo = "vidya";

    var page = "";
    if (parts[0] === repo) {
      page = parts.slice(1).join('/');
    } else {
      page = parts.join('/');
    }

    var search = window.location.search || "";
    var hash = window.location.hash || "";

    // Construct redirect target URL back to index.html with ?p=page
    var target = window.location.protocol + "//" + window.location.host + "/" + repo + "/?p=" + encodeURIComponent(page);
    if (search) {
      target += "&s=" + encodeURIComponent(search);
    }
    if (hash) {
      target += hash;
    }

    window.location.replace(target);
  </script>
</head>

<body>
</body>

</html>
