<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA 404 Hack
    // When GitHub Pages can't find a file, it serves this 404.html.
    // We redirect to index.html with a ?p= query param so the SPA router can handle it.
    (function() {
      var loc = globalThis.location;
      var pathSegments = loc.pathname.split('/').filter(Boolean);

      // Detect if we're on GitHub Pages (repo is in the path) or local dev (no repo prefix)
      var repo = 'vidya';
      var repoIndex = pathSegments.indexOf(repo);
      var basePath = '/';
      var routePath = '';

      if (repoIndex >= 0) {
        // GitHub Pages: path looks like /vidya/explore-projects
        basePath = '/' + repo + '/';
        routePath = pathSegments.slice(repoIndex + 1).join('/');
      } else {
        // Local dev server: path looks like /explore-projects
        basePath = '/';
        routePath = pathSegments.join('/');
      }

      // If there's no route, just go to the root
      if (!routePath) {
        globalThis.location.replace(loc.protocol + '//' + loc.host + basePath);
        return;
      }

      // Build the redirect URL: <basePath>?p=<route>
      var target = loc.protocol + '//' + loc.host + basePath + '?p=' + encodeURIComponent(routePath);

      // Preserve any existing search params (but strip the leading ?)
      if (loc.search && loc.search.length > 1) {
        target += '&' + loc.search.slice(1);
      }

      // Preserve the hash
      if (loc.hash) {
        target += loc.hash;
      }

      globalThis.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
