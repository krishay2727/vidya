<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vidya STEAM Education</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
</head>
<body>

<!-- NAV -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="javascript:void(0)" class="nav-logo" onclick="showPage('home')">
      <span class="logo-bolt">⚡</span>
      <span class="logo-text">Vidya <span class="logo-steam">STEAM</span></span>
    </a>
    <div class="nav-links">
      <a href="javascript:void(0)" onclick="showPage('home')" class="nav-link" data-page="home">Home</a>
      <a href="javascript:void(0)" onclick="showPage('sessions')" class="nav-link" data-page="sessions">Sessions</a>
      <a href="javascript:void(0)" onclick="showPage('projects')" class="nav-link" data-page="projects">Projects</a>
      <a href="javascript:void(0)" onclick="showPage('whiteboard')" class="nav-link" data-page="whiteboard">✏️ Whiteboard</a>
      <a href="javascript:void(0)" onclick="showPage('live-quiz')" class="nav-link" data-page="live-quiz">Live Quiz</a>
      <a href="javascript:void(0)" onclick="showPage('about')" class="nav-link" data-page="about">About</a>
    </div>
    <button class="nav-hamburger" onclick="toggleMobileMenu()">☰</button>
  </div>
  <div class="nav-mobile" id="navMobile">
    <a href="javascript:void(0)" onclick="showPage('home');toggleMobileMenu()">Home</a>
    <a href="javascript:void(0)" onclick="showPage('sessions');toggleMobileMenu()">Sessions</a>
    <a href="javascript:void(0)" onclick="showPage('projects');toggleMobileMenu()">Projects</a>
    <a href="javascript:void(0)" onclick="showPage('whiteboard');toggleMobileMenu()">✏️ Whiteboard</a>
    <a href="javascript:void(0)" onclick="showPage('live-quiz');toggleMobileMenu()">Live Quiz</a>
    <a href="javascript:void(0)" onclick="showPage('about');toggleMobileMenu()">About</a>
  </div>
</nav>

<!-- =================== DYNAMIC VIEW CONTAINER =================== -->
<main id="app-root"></main>

<!-- =================== QUIZ MODAL =================== -->
<div id="quizModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <button class="modal-close" onclick="closeQuiz()">✕</button>
    <div id="quizContent"></div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="logo-bolt">⚡</span>
      <span class="logo-text">Vidya <span class="logo-steam">STEAM</span></span>
    </div>
    <p class="footer-tagline">Build. Break. Learn. Repeat.</p>
    <p class="footer-copy">© 2025 Vidya STEAM Education · Tinkering Lab · Grades 1–9</p>
  </div>
</footer>

<script src="js/state.js"></script>
<script src="js/routing.js"></script>
<script src="js/home.js"></script>
<script src="js/session.js"></script>
<script src="js/quiz.js"></script>
<script src="js/leaderboard.js"></script>
<script src="js/projects.js"></script>
<script src="js/about.js"></script>
<script src="js/whiteboard.js"></script>
<script src="js/main.js"></script>
<script type="module" src="js/live-quiz.js"></script>
</body>
</html>
